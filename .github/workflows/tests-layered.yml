name: Tests (Layered)

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  public_export_gate:
    name: Public Export Privacy Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Verify no private paths, owner data, or runtime files would be exported
        run: node scripts/verify-public-export.mjs --exclude-config scripts/public-export.config.json

  prompt_contract:
    name: Prompt Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Verify prompt contract
        env:
          PROMPT_CONTRACT_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
          PROMPT_CONTRACT_HEAD: ${{ github.sha }}
        run: pnpm verify:prompt-contract -- --base="$PROMPT_CONTRACT_BASE" --head="$PROMPT_CONTRACT_HEAD"

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    needs: prompt_contract
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  unit:
    name: Unit
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: mkdir -p reports
      - run: pnpm test:unit:report
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report-unit
          path: reports/unit.json
          if-no-files-found: error

  integration:
    name: Integration
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: mkdir -p reports
      - run: pnpm test:integration:report
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report-integration
          path: reports/integration.json
          if-no-files-found: error

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:all
      - name: Install browser for Web UI smoke
        run: pnpm exec playwright install --with-deps chromium
      - run: mkdir -p reports
      - run: pnpm test:e2e:report
      - run: pnpm test:e2e:web -- --skip-build
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report-e2e
          path: |
            reports/e2e.json
            reports/web-ui-smoke.json
            output/playwright/web-ui-smoke.png
          if-no-files-found: error
