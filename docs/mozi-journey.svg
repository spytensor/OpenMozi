<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 800" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f1a"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="timelineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="20%" stop-color="#8b5cf6"/>
      <stop offset="40%" stop-color="#ec4899"/>
      <stop offset="60%" stop-color="#f59e0b"/>
      <stop offset="80%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1400" height="800" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  </pattern>
  <rect width="1400" height="800" fill="url(#grid)" opacity="0.3"/>

  <!-- Title Section -->
  <text x="700" y="50" text-anchor="middle" fill="#e6edf3" font-size="32" font-weight="700">MOZI -- Architecture Journey</text>
  <text x="700" y="75" text-anchor="middle" fill="#7d8590" font-size="14">5-Layer Agent OS with CLI-Pipe Providers</text>

  <!-- Timeline Base Line -->
  <line x1="80" y1="420" x2="1320" y2="420" stroke="url(#timelineGrad)" stroke-width="4" stroke-linecap="round"/>

  <!-- Glow effect under timeline -->
  <ellipse cx="700" cy="420" rx="620" ry="20" fill="url(#glowGrad)"/>

  <!-- =========== Day 1: Foundation =========== -->
  <g transform="translate(130, 420)">
    <circle r="14" fill="#1c2333" stroke="#3b82f6" stroke-width="3"/>
    <circle r="5" fill="#3b82f6"/>
    <text y="-28" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="600">Day 1</text>
    <text y="-12" text-anchor="middle" fill="#7d8590" font-size="9">2026-02-23</text>
  </g>

  <rect x="65" y="145" width="170" height="215" rx="12" fill="#1c2333" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="150" y="168" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="600">L0-L1 Foundation</text>
  <rect x="78" y="180" width="144" height="22" rx="5" fill="#1e293b"/>
  <text x="150" y="195" text-anchor="middle" fill="#93c5fd" font-size="8">Telegram Channel (L0)</text>
  <rect x="78" y="207" width="144" height="22" rx="5" fill="#1e293b"/>
  <text x="150" y="222" text-anchor="middle" fill="#93c5fd" font-size="8">Multi-provider Wizard</text>
  <rect x="78" y="234" width="144" height="22" rx="5" fill="#1e293b"/>
  <text x="150" y="249" text-anchor="middle" fill="#93c5fd" font-size="8">Web UI Pairing</text>
  <rect x="78" y="261" width="144" height="22" rx="5" fill="#1e293b"/>
  <text x="150" y="276" text-anchor="middle" fill="#93c5fd" font-size="8">Loop Guard + Recovery</text>
  <text x="150" y="338" text-anchor="middle" fill="#3b82f6" font-size="26" font-weight="700">142</text>
  <text x="150" y="352" text-anchor="middle" fill="#7d8590" font-size="9">tests</text>

  <!-- =========== Day 2: Core =========== -->
  <g transform="translate(330, 420)">
    <circle r="14" fill="#1c2333" stroke="#8b5cf6" stroke-width="3"/>
    <circle r="5" fill="#8b5cf6"/>
    <text y="-28" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="600">Day 2</text>
    <text y="-12" text-anchor="middle" fill="#7d8590" font-size="9">2026-02-24</text>
  </g>

  <rect x="265" y="460" width="170" height="215" rx="12" fill="#1c2333" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="350" y="483" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="600">L2-L3 Brain + TEL</text>
  <rect x="278" y="495" width="144" height="22" rx="5" fill="#1e1a2e"/>
  <text x="350" y="510" text-anchor="middle" fill="#c4b5fd" font-size="8">DAG Task Decomposition</text>
  <rect x="278" y="522" width="144" height="22" rx="5" fill="#1e1a2e"/>
  <text x="350" y="537" text-anchor="middle" fill="#c4b5fd" font-size="8">Multi-Agent Collaboration</text>
  <rect x="278" y="549" width="144" height="22" rx="5" fill="#1e1a2e"/>
  <text x="350" y="564" text-anchor="middle" fill="#c4b5fd" font-size="8">Three-Tier Memory</text>
  <rect x="278" y="576" width="144" height="22" rx="5" fill="#1e1a2e"/>
  <text x="350" y="591" text-anchor="middle" fill="#c4b5fd" font-size="8">Agent Loop v2</text>
  <text x="350" y="653" text-anchor="middle" fill="#8b5cf6" font-size="26" font-weight="700">271</text>
  <text x="350" y="667" text-anchor="middle" fill="#7d8590" font-size="9">tests</text>

  <!-- =========== Day 3: Engineering =========== -->
  <g transform="translate(530, 420)">
    <circle r="14" fill="#1c2333" stroke="#ec4899" stroke-width="3"/>
    <circle r="5" fill="#ec4899"/>
    <text y="-28" text-anchor="middle" fill="#f472b6" font-size="12" font-weight="600">Day 3</text>
    <text y="-12" text-anchor="middle" fill="#7d8590" font-size="9">2026-02-25</text>
  </g>

  <rect x="465" y="145" width="170" height="215" rx="12" fill="#1c2333" stroke="#ec4899" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="550" y="168" text-anchor="middle" fill="#f472b6" font-size="11" font-weight="600">L3-L4 Engineering</text>
  <rect x="478" y="180" width="144" height="22" rx="5" fill="#2d1f2e"/>
  <text x="550" y="195" text-anchor="middle" fill="#f9a8d4" font-size="8">Handler Modularization</text>
  <rect x="478" y="207" width="144" height="22" rx="5" fill="#2d1f2e"/>
  <text x="550" y="222" text-anchor="middle" fill="#f9a8d4" font-size="8">Dead Code Cleanup</text>
  <rect x="478" y="234" width="144" height="22" rx="5" fill="#2d1f2e"/>
  <text x="550" y="249" text-anchor="middle" fill="#f9a8d4" font-size="8">Provider Registry</text>
  <rect x="478" y="261" width="144" height="22" rx="5" fill="#2d1f2e"/>
  <text x="550" y="276" text-anchor="middle" fill="#f9a8d4" font-size="8">Layered Template System</text>
  <text x="550" y="338" text-anchor="middle" fill="#ec4899" font-size="26" font-weight="700">299</text>
  <text x="550" y="352" text-anchor="middle" fill="#7d8590" font-size="9">tests</text>

  <!-- =========== Day 4: Security =========== -->
  <g transform="translate(730, 420)">
    <circle r="14" fill="#1c2333" stroke="#f59e0b" stroke-width="3"/>
    <circle r="5" fill="#f59e0b"/>
    <text y="-28" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="600">Day 4</text>
    <text y="-12" text-anchor="middle" fill="#7d8590" font-size="9">2026-02-27</text>
